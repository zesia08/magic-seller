<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영자 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">ADMIN 매직셀러 운영자 대시보드</h1>
        
        <!-- 핵심 지표 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="text-gray-500 text-sm">오늘 가입 기업</div>
                <div class="text-3xl font-bold text-blue-600">0</div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="text-gray-500 text-sm">오늘 매칭 요청</div>
                <div class="text-3xl font-bold text-purple-600">0</div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="text-gray-500 text-sm">오늘 결제 금액</div>
                <div class="text-3xl font-bold text-green-600">0원</div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="text-gray-500 text-sm">미처리 알림</div>
                <div class="text-3xl font-bold text-red-600">0</div>
            </div>
        </div>

        <!-- 자동화 상태 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">BOT 자동화 시스템 상태</h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center p-3 bg-green-50 rounded">
                    <span>데이터 수집 봇</span>
                    <span class="text-green-600 font-bold">[ON] 정상 작동 중</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-green-50 rounded">
                    <span>AI 매칭 엔진</span>
                    <span class="text-green-600 font-bold">[ON] 정상 작동 중</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-green-50 rounded">
                    <span>결제 시스템</span>
                    <span class="text-green-600 font-bold">[ON] 정상 작동 중</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-yellow-50 rounded">
                    <span>이메일 알림</span>
                    <span class="text-yellow-600 font-bold">[WAIT] 대기열 3건</span>
                </div>
            </div>
        </div>

        <!-- 이상 징후 알림 -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4 text-red-600">ALERT 확인 필요</h2>
            <div class="space-y-2">
                <p class="text-gray-500">현재 이상 징후 없음 - 시스템이 자동으로 처리 중입니다</p>
            </div>
        </div>
    </div>

    <script>
        // 30분마다 자동 새로고침
        setInterval(() => location.reload(), 30 * 60 * 1000);
    </script>
</body>
</html>
