<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매직셀러 - AI 중국 인플루언서 매칭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .match-card { transition: all 0.3s ease; }
        .match-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .score-bar { background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 헤더 -->
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🎯</div>
                <div>
                    <h1 class="text-2xl font-bold">매직셀러</h1>
                    <p class="text-xs opacity-80">AI 중국 인플루언서 매칭</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-white/20 px-4 py-2 rounded-lg">
                    💎 <span id="userCredit" class="font-bold">0</span> C
                </div>
                <button onclick="showMyPage()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-gray-100">
                    마이페이지
                </button>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <div class="container mx-auto mt-8 px-4">
        
        <!-- 히어로 섹션 -->
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold mb-4">🤖 AI가 찾아주는 <span class="text-blue-600">완벽한 인플루언서</span></h2>
            <p class="text-gray-600 text-lg">12개 차원 분석으로 당신의 제품에 꼭 맞는 중국 인플루언서를 추천합니다</p>
        </div>

        <!-- 온보딩 폼 -->
        <div id="onboardingForm" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8 mb-8">
            <div class="flex items-center gap-2 mb-6 text-gray-500">
                <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-bold">STEP 1/3</span>
                <span>기업 정보 입력 (3분 소요)</span>
            </div>

            <form onsubmit="startMatching(event)" class="space-y-6">
                <!-- 회사 기본 정보 -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-2 text-gray-700">회사명 *</label>
                        <input type="text" id="companyName" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="예: (주)뷰티코리아">
                    </div>
                    <div>
                        <label class="block font-bold mb-2 text-gray-700">담당자 이메일 *</label>
                        <input type="email" id="companyEmail" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@company.com">
                    </div>
                </div>

                <!-- 제품 정보 -->
                <div>
                    <label class="block font-bold mb-2 text-gray-700">제품 카테고리 *</label>
                    <div class="grid grid-cols-5 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="beauty" class="hidden peer" checked>
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                <div class="text-3xl mb-1">💄</div>
                                <div class="text-sm font-bold">뷰티</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="food" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                <div class="text-3xl mb-1">🍜</div>
                                <div class="text-sm font-bold">식품</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="fashion" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                <div class="text-3xl mb-1">👗</div>
                                <div class="text-sm font-bold">패션</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="home" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                <div class="text-3xl mb-1">🏠</div>
                                <div class="text-sm font-bold">리빙</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="baby" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                <div class="text-3xl mb-1">👶</div>
                                <div class="text-sm font-bold">육아</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 타겟 정보 -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-2 text-gray-700">희망 판매가 (원) *</label>
                        <input type="number" id="targetPrice" required min="1000" step="1000" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="50000" value="50000">
                        <p class="text-sm text-gray-500 mt-1">AI가 이 가격대에 맞는 인플루언서를 찾습니다</p>
                    </div>
                    <div>
                        <label class="block font-bold mb-2 text-gray-700">주요 타겟 연령대 *</label>
                        <select id="targetAge" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="10s">10대 (13-19세)</option>
                            <option value="20s_early" selected>20대 초반 (20-24세)</option>
                            <option value="20s_late">20대 후반 (25-29세)</option>
                            <option value="30s">30대 (30-39세)</option>
                            <option value="40s">40대 이상</option>
                        </select>
                    </div>
                </div>

                <!-- 브랜드 톤 -->
                <div>
                    <label class="block font-bold mb-2 text-gray-700">브랜드 이미지</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="brandTone" value="luxury" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-purple-500 peer-checked:bg-purple-50">
                                <div class="text-2xl mb-1">💎</div>
                                <div class="font-bold">고급스러운</div>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="brandTone" value="trendy" class="hidden peer" checked>
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-pink-500 peer-checked:bg-pink-50">
                                <div class="text-2xl mb-1">🔥</div>
                                <div class="font-bold">트렌디한</div>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="brandTone" value="friendly" class="hidden peer">
                            <div class="p-4 border-2 rounded-lg text-center peer-checked:border-green-500 peer-checked:bg-green-50">
                                <div class="text-2xl mb-1">😊</div>
                                <div class="font-bold">친근한</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 제품 이미지 -->
                <div>
                    <label class="block font-bold mb-2 text-gray-700">제품 사진 (선택)</label>
                    <div class="border-2 border-dashed rounded-lg p-8 text-center hover:bg-gray-50 cursor-pointer" onclick="document.getElementById('productImage').click()">
                        <input type="file" id="productImage" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <div id="imagePreview" class="text-gray-400">
                            <div class="text-4xl mb-2">📷</div>
                            <p>클릭해서 제품 사진 업로드</p>
                            <p class="text-sm">AI가 이미지로 제품 특성을 분석합니다</p>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-lg font-bold text-lg hover:opacity-90 transition-all flex items-center justify-center gap-2">
                    <span>🚀 AI 매칭 시작하기</span>
                    <span class="text-sm opacity-80">(30초 소요)</span>
                </button>
            </form>
        </div>

        <!-- 로딩 화면 -->
        <div id="loadingScreen" class="hidden max-w-2xl mx-auto text-center py-20">
            <div class="loading w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <h3 class="text-2xl font-bold mb-2">🤖 AI 분석 중...</h3>
            <p class="text-gray-600" id="loadingText">12개 차원의 데이터를 분석하고 있습니다</p>
        </div>

        <!-- 매칭 결과 -->
        <div id="resultArea" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">🎯 AI 추천 인플루언서 <span id="resultCount" class="text-blue-600">TOP 10</span></h3>
                <div class="flex gap-2">
                    <button onclick="filterResults('all')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">전체</button>
                    <button onclick="filterResults('s')" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">S등급</button>
                    <button onclick="filterResults('a')" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">A등급</button>
                </div>
            </div>

            <div id="influencerList" class="space-y-4 mb-8">
                <!-- AI가 채워넣음 -->
            </div>

            <!-- 더보기 -->
            <div class="text-center">
                <button onclick="loadMore()" class="bg-white border-2 border-blue-600 text-blue-600 px-8 py-3 rounded-lg font-bold hover:bg-blue-50">
                    더 많은 인플루언서 보기 (50C)
                </button>
            </div>
        </div>

        <!-- 크레딧 충전 모달 -->
        <div id="creditModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">💎 크레딧 충전</h3>
                    <button onclick="closeCreditModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                </div>
                
                <div class="space-y-3 mb-6">
                    <button onclick="chargeCredit(10000)" class="w-full p-4 border-2 rounded-lg flex justify-between items-center hover:border-blue-500 transition-all">
                        <div class="flex items-center gap-3">
                            <div class="text-2xl">💎</div>
                            <div class="text-left">
                                <div class="font-bold">100 크레딧</div>
                                <div class="text-sm text-gray-500">기본 패키지</div>
                            </div>
                        </div>
                        <div class="font-bold text-blue-600">₩10,000</div>
                    </button>

                    <button onclick="chargeCredit(40000)" class="w-full p-4 border-2 border-blue-500 bg-blue-50 rounded-lg flex justify-between items-center relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-red-500 text-white text-xs px-2 py-1 rounded-bl-lg">20% 할인</div>
                        <div class="flex items-center gap-3">
                            <div class="text-2xl">💎💎</div>
                            <div class="text-left">
                                <div class="font-bold">400 크레딧</div>
                                <div class="text-sm text-gray-500">인기 패키지</div>
                            </div>
                        </div>
                        <div class="font-bold text-blue-600">₩40,000</div>
                    </button>

                    <button onclick="chargeCredit(70000)" class="w-full p-4 border-2 rounded-lg flex justify-between items-center hover:border-blue-500 transition-all relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-red-500 text-white text-xs px-2 py-1 rounded-bl-lg">30% 할인</div>
                        <div class="flex items-center gap-3">
                            <div class="text-2xl">💎💎💎</div>
                            <div class="text-left">
                                <div class="font-bold">700 크레딧</div>
                                <div class="text-sm text-gray-500">대기업 패키지</div>
                            </div>
                        </div>
                        <div class="font-bold text-blue-600">₩70,000</div>
                    </button>
                </div>

                <p class="text-sm text-gray-500 text-center">💡 크레딧은 상세 정보 열람, 연락처 확인, 매칭 요청에 사용됩니다</p>
            </div>
        </div>
    </div>

    <script>
        // ===== 설정 =====
        // ⚠️ 여기에 본인의 Supabase 정보 입력!
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';  // 6-3에서 복사한 URL
        const SUPABASE_KEY = 'eyJhbG...';  // 6-3에서 복사한 anon key
        
        // 토스 결제 키 (테스트용)
        const TOSS_CLIENT_KEY = 'test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq';
        
        let supabase, tossPayments;
        let currentUser = null;
        let matchResults = [];

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            tossPayments = TossPayments(TOSS_CLIENT_KEY);
            
            // 로컬 저장소에서 사용자 확인
            const savedUser = localStorage.getItem('magicSellerUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateCreditDisplay();
            }
        });

        // ===== 함수들 =====

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').innerHTML = 
                        `<img src="${e.target.result}" class="max-h-48 mx-auto rounded-lg">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startMatching(e) {
            e.preventDefault();
            
            // 폼 데이터 수집
            const companyData = {
                name: document.getElementById('companyName').value,
                email: document.getElementById('companyEmail').value,
                category: document.querySelector('input[name="category"]:checked').value,
                target_price: parseInt(document.getElementById('targetPrice').value),
                target_age: document.getElementById('targetAge').value,
                brand_tone: document.querySelector('input[name="brandTone"]:checked').value
            };

            // UI 전환
            document.getElementById('onboardingForm').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');

            // 로딩 텍스트 애니메이션
            const loadingTexts = [
                "제품 특성을 AI로 분석 중...",
                "중국 인플루언서 50,000명 데이터 스캔 중...",
                "최근 판매 실적 및 라이브 데이터 확인 중...",
                "한국 제품 판매 경험 필터링 중...",
                "12차원 매칭 알고리즘 적용 중...",
                "최종 순위 산정 중..."
            ];
            
            let textIndex = 0;
            const textInterval = setInterval(() => {
                if (textIndex < loadingTexts.length) {
                    document.getElementById('loadingText').textContent = loadingTexts[textIndex];
                    textIndex++;
                }
            }, 4000);

            // DB에 기업 저장 + AI 매칭
            try {
                // 1. 기업 정보 저장
                const { data: company, error } = await supabase
                    .from('companies')
                    .insert([companyData])
                    .select()
                    .single();

                if (error) throw error;
                
                currentUser = company;
                localStorage.setItem('magicSellerUser', JSON.stringify(company));

                // 2. AI 매칭 실행 (가상 데이터로 시뮬레이션)
                await simulateAIMatching(companyData);

                // 3. 결과 표시
                clearInterval(textInterval);
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
                
                displayResults(matchResults.slice(0, 10)); // TOP 10 무료

            } catch (err) {
                alert('오류 발생: ' + err.message);
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('onboardingForm').classList.remove('hidden');
            }
        }

        async function simulateAIMatching(company) {
            // 실제로는 DB에서 인플루언서 데이터 가져와서 계산
            // 여기서는 시뮬레이션 데이터로演示
            
            const mockInfluencers = [
                { name: '小美Beauty', category: 'beauty', followers: 1800000, avg_price: 48000, days_since_live: 2, korean_count: 5, target_match: 0.85, response_rate: 0.9, monthly_sales: 300000, growth: 0.25, live_viewers: 15000 },
                { name: '时尚达人Lily', category: 'fashion', followers: 950000, avg_price: 60000, days_since_live: 5, korean_count: 0, target_match: 0.60, response_rate: 0.7, monthly_sales: 150000, growth: 0.10, live_viewers: 8000 },
                { name: '吃播小姐姐', category: 'food', followers: 2200000, avg_price: 30000, days_since_live: 1, korean_count: 2, target_match: 0.40, response_rate: 0.95, monthly_sales: 500000, growth: 0.30, live_viewers: 25000 },
                { name: '美妆教主Coco', category: 'beauty', followers: 3200000, avg_price: 55000, days_since_live: 3, korean_count: 8, target_match: 0.90, response_rate: 0.85, monthly_sales: 450000, growth: 0.15, live_viewers: 20000 },
                { name: '潮流先锋Mike', category: 'fashion', followers: 1200000, avg_price: 45000, days_since_live: 7, korean_count: 1, target_match: 0.75, response_rate: 0.8, monthly_sales: 280000, growth: 0.20, live_viewers: 12000 },
                { name: '健康生活家', category: 'food', followers: 800000, avg_price: 40000, days_since_live: 2, korean_count: 3, target_match: 0.55, response_rate: 0.88, monthly_sales: 220000, growth: 0.35, live_viewers: 10000 },
                { name: '宝妈育儿经', category: 'baby', followers: 1500000, avg_price: 35000, days_since_live: 4, korean_count: 4, target_match: 0.65, response_rate: 0.92, monthly_sales: 380000, growth: 0.18, live_viewers: 18000 },
                { name: '家居设计师阿杰', category: 'home', followers: 600000, avg_price: 70000, days_since_live: 1, korean_count: 0, target_match: 0.50, response_rate: 0.75, monthly_sales: 180000, growth: 0.22, live_viewers: 6000 },
                { name: '韩国欧尼小美', category: 'beauty', followers: 2100000, avg_price: 50000, days_since_live: 2, korean_count: 15, target_match: 0.88, response_rate: 0.95, monthly_sales: 520000, growth: 0.28, live_viewers: 22000 },
                { name: '时尚辣妈Sunny', category: 'fashion', followers: 1100000, avg_price: 52000, days_since_live: 6, korean_count: 2, target_match: 0.70, response_rate: 0.82, monthly_sales: 260000, growth: 0.12, live_viewers: 11000 }
            ];

            // AI 점수 계산
            matchResults = mockInfluencers.map(inf => {
                let score = 0;
                const details = [];

                // 1. 카테고리 (20점)
                if (inf.category === company.category) {
                    score += 20;
                    details.push('카테고리 완벽 일치');
                }

                // 2. 가격대 (15점)
                const priceDiff = Math.abs(company.target_price - inf.avg_price);
                const priceScore = Math.max(0, 15 - (priceDiff / 10000));
                score += priceScore;
                if (priceScore > 10) details.push('가격대 적합');

                // 3. 최근 활동 (15점)
                if (inf.days_since_live <= 3) {
                    score += 15;
                    details.push('최근 활발 활동');
                } else if (inf.days_since_live <= 7) {
                    score += 10;
                }

                // 4. 한국제품 경험 (15점)
                if (inf.korean_count > 0) {
                    score += 15;
                    details.push(`한국제품 ${inf.korean_count}회 판매`);
                }

                // 5. 타겟 매칭 (10점)
                score += inf.target_match * 10;

                // 6. 응답률 (10점)
                score += inf.response_rate * 10;
                if (inf.response_rate > 0.9) details.push('응답률 우수');

                // 7. 매출 규모 (10점)
                score += Math.min(10, inf.monthly_sales / 50000);
                if (inf.monthly_sales > 400000) details.push('매출 규모 우수');

                // 8. 성장세 (5점)
                if (inf.growth > 0.2) {
                    score += 5;
                    details.push('성장세 급상승');
                }

                // 등급 산정
                let tier = 'C';
                if (score >= 90) tier = 'S';
                else if (score >= 80) tier = 'A';
                else if (score >= 70) tier = 'B';

                return {
                    ...inf,
                    score: Math.min(100, Math.round(score)),
                    tier,
                    reasons: details.slice(0, 3),
                    unlocked: false
                };
            });

            // 점수 높은 순 정렬
            matchResults.sort((a, b) => b.score - a.score);

            // 1초 지연 (AI 계신 것처럼)
            await new Promise(r => setTimeout(r, 1000));
        }

        function displayResults(results) {
            const container = document.getElementById('influencerList');
            
            container.innerHTML = results.map((inf, index) => `
                <div class="match-card bg-white rounded-xl shadow p-6 border-l-4 ${inf.tier === 'S' ? 'border-purple-500' : inf.tier === 'A' ? 'border-blue-500' : 'border-gray-300'}">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center text-white text-2xl font-bold">
                                ${inf.name[0]}
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-2xl font-bold text-gray-800">${inf.name}</span>
                                    <span class="bg-${inf.tier === 'S' ? 'purple' : inf.tier === 'A' ? 'blue' : 'gray'}-100 text-${inf.tier === 'S' ? 'purple' : inf.tier === 'A' ? 'blue' : 'gray'}-800 px-3 py-1 rounded-full text-sm font-bold">
                                        ${inf.tier}등급
                                    </span>
                                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs">
                                        적합도 ${inf.score}%
                                    </span>
                                </div>
                                <div class="flex gap-4 text-sm text-gray-600 mb-2">
                                    <span>📱 ${(inf.followers/10000).toFixed(1)}만 팔로워</span>
                                    <span>💰 월 ${(inf.monthly_sales/10000).toFixed(0)}만원 매출</span>
                                    <span>👥 평균 ${inf.live_viewers.toLocaleString()}명 시청</span>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    ${inf.reasons.map(r => `<span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs">✓ ${r}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <div class="text-right">
                            ${inf.unlocked ? `
                                <div class="space-y-2">
                                    <div class="text-sm text-gray-600">📞 위챗: ${inf.contact || 'beauty_coco2024'}</div>
                                    <div class="text-sm text-gray-600">✉️ 이메일: ${inf.email || 'contact@example.com'}</div>
                                    <button onclick="requestMatch('${inf.name}')" class="w-full bg-green-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-700">
                                        매칭 요청하기
                                    </button>
                                </div>
                            ` : `
                                <div class="space-y-2">
                                    <button onclick="unlockDetail(${index})" class="block w-full bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">
                                        상세정보 열람 (50C)
                                    </button>
                                    <button onclick="quickContact(${index})" class="block w-full border-2 border-blue-600 text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-50">
                                        바로컨택 (150C)
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                    
                    <!-- 상세 정보 (열람 후 표시) -->
                    <div id="detail-${index}" class="hidden mt-4 pt-4 border-t">
                        <div class="grid grid-cols-4 gap-4 text-center">
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-blue-600">${inf.response_rate*100}%</div>
                                <div class="text-xs text-gray-600">응답률</div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-purple-600">${inf.korean_count}회</div>
                                <div class="text-xs text-gray-600">한국제품 판매</div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-green-600">${inf.growth > 0 ? '+' : ''}${(inf.growth*100).toFixed(0)}%</div>
                                <div class="text-xs text-gray-600">성장률</div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-orange-600">${inf.days_since_live}일</div>
                                <div class="text-xs text-gray-600">최근 라이브</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function unlockDetail(index) {
            if (!currentUser || currentUser.credit < 50) {
                alert('크레딧이 부족합니다! 충전해주세요.');
                showCreditModal();
                return;
            }
            
            // 크레딧 차감 시뮬레이션
            matchResults[index].unlocked = true;
            document.getElementById(`detail-${index}`).classList.remove('hidden');
            
            // UI 업데이트
            displayResults(matchResults.slice(0, document.querySelectorAll('.match-card').length));
            updateCreditDisplay(-50);
        }

        function quickContact(index) {
            if (!currentUser || currentUser.credit < 150) {
                alert('크레딧이 부족합니다! (150C 필요)');
                showCreditModal();
                return;
            }
            
            matchResults[index].unlocked = true;
            updateCreditDisplay(-150);
            alert(`${matchResults[index].name}님에게 컨택 메시지를 보냈습니다! 24시간 내 응답 예정입니다.`);
        }

        function showCreditModal() {
            document.getElementById('creditModal').classList.remove('hidden');
        }

        function closeCreditModal() {
            document.getElementById('creditModal').classList.add('hidden');
        }

        function chargeCredit(amount) {
            const orderId = 'order_' + Date.now() + '_' + currentUser?.id || 'guest';
            
            tossPayments.requestPayment('카드', {
                amount: amount,
                orderId: orderId,
                orderName: `매직셀러 크레딧 ${amount/100}C`,
                customerName: currentUser?.name || '게스트',
                successUrl: window.location.origin + '/success.html?amount=' + amount,
                failUrl: window.location.origin + '/fail.html'
            });
        }

        function updateCreditDisplay(change = 0) {
            if (currentUser) {
                currentUser.credit = (currentUser.credit || 0) + change;
                document.getElementById('userCredit').textContent = currentUser.credit;
                localStorage.setItem('magicSellerUser', JSON.stringify(currentUser));
            }
        }

        function filterResults(tier) {
            const filtered = tier === 'all' ? matchResults : matchResults.filter(i => i.tier.toLowerCase() === tier);
            displayResults(filtered.slice(0, 10));
        }

        function loadMore() {
            if (!currentUser || currentUser.credit < 50) {
                showCreditModal();
                return;
            }
            // 추가 40명 표시
            displayResults(matchResults.slice(0, 50));
            updateCreditDisplay(-50);
        }

        function showMyPage() {
            if (!currentUser) {
                alert('먼저 매칭을 진행해주세요!');
                return;
            }
            alert(`마이페이지\n회사: ${currentUser.name}\n남은 크레딧: ${currentUser.credit}C\n\n(추후 개발 예정)`);
        }
    </script>
</body>
</html>
