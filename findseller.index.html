<!-- index.html - 가장 기본적인 시작 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매직셀러 - AI 인플루언서 매칭</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 헤더 -->
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-2xl font-bold">매직셀러</h1>
            <div>크레딧: <span id="credit">0</span>C</div>
        </div>
    </nav>

    <!-- 메인 폼 -->
    <div class="container mx-auto mt-10 max-w-2xl bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl mb-6">🎯 내 제품에 맞는 인플루언서 찾기</h2>
        
        <form id="matchingForm" class="space-y-4">
            <!-- 1. 제품 카테고리 -->
            <div>
                <label class="block font-bold mb-2">제품 카테고리</label>
                <select id="category" class="w-full p-2 border rounded">
                    <option value="beauty">뷰티/화장품</option>
                    <option value="food">식품/건강식품</option>
                    <option value="fashion">패션/의류</option>
                    <option value="home">리빙/가전</option>
                    <option value="baby">육아/출산</option>
                </select>
            </div>

            <!-- 2. 타겟 연령 -->
            <div>
                <label class="block font-bold mb-2">주요 타겟 연령대</label>
                <div class="flex gap-4">
                    <label><input type="checkbox" name="age" value="10s"> 10대</label>
                    <label><input type="checkbox" name="age" value="20s_early"> 20대 초반</label>
                    <label><input type="checkbox" name="age" value="20s_late"> 20대 후반</label>
                    <label><input type="checkbox" name="age" value="30s"> 30대</label>
                </div>
            </div>

            <!-- 3. 희망 판매가 -->
            <div>
                <label class="block font-bold mb-2">제품 판매가격대 (원)</label>
                <input type="range" id="priceRange" min="10000" max="200000" step="10000" 
                       class="w-full" oninput="document.getElementById('priceValue').textContent=this.value">
                <div>선택: ₩<span id="priceValue">50000</span></div>
            </div>

            <!-- 4. 브랜드 톤 -->
            <div>
                <label class="block font-bold mb-2">브랜드 이미지</label>
                <div class="flex gap-4">
                    <button type="button" class="tone-btn p-4 border rounded hover:bg-blue-50" data-tone="luxury">
                        💎 고급스러운
                    </button>
                    <button type="button" class="tone-btn p-4 border rounded hover:bg-blue-50" data-tone="trendy">
                        🔥 트렌디한
                    </button>
                    <button type="button" class="tone-btn p-4 border rounded hover:bg-blue-50" data-tone="friendly">
                        😊 친근한
                    </button>
                </div>
            </div>

            <!-- 5. 제품 이미지 -->
            <div>
                <label class="block font-bold mb-2">제품 사진 (AI 분석용)</label>
                <input type="file" id="productImage" accept="image/*" class="w-full p-2 border rounded">
                <p class="text-sm text-gray-500">* AI가 이미지로 제품 특성을 자동 분석합니다</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-lg hover:bg-blue-700">
                🤖 AI 매칭 시작하기 (30초 소요)
            </button>
        </form>
    </div>

    <!-- 결과 영역 (처음엔 숨김) -->
    <div id="resultArea" class="container mx-auto mt-8 max-w-4xl hidden">
        <h3 class="text-xl mb-4">🎯 AI 추천 인플루언서</h3>
        <div id="influencerList" class="space-y-4"></div>
    </div>

    <script>
        // 간단한 AI 매칭 시뮬레이션
        document.getElementById('matchingForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // 로딩 표시
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = '🔍 AI 분석중...';
            btn.disabled = true;

            // 2초 후 결과 표시 (실제로는 API 호출)
            setTimeout(() => {
                showResults();
                btn.textContent = originalText;
                btn.disabled = false;
            }, 2000);
        };

        function showResults() {
            const results = [
                { name: '小美Beauty', category: '뷰티', followers: '180만', match: 96, 
                  reason: '한국 화장품 5회 판매, 20대여성 85%, 최근 3일 라이브 2회' },
                { name: '时尚达人Lily', category: '패션', followers: '95만', match: 89,
                  reason: '유사 가격대 제품 평균 ¥300K 매출, 상하이 1선 도시 타겟' },
                { name: '吃播小姐姐', category: '식품', followers: '220만', match: 87,
                  reason: '건강식품 전문, 평균 시청자 25,000명, 전환율 4.5%' }
            ];

            const html = results.map((inf, i) => `
                <div class="bg-white p-6 rounded-lg shadow flex justify-between items-center">
                    <div class="flex gap-4">
                        <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center text-2xl">
                            👤
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h4 class="font-bold text-lg">#${i+1} ${inf.name}</h4>
                                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm">
                                    적합도 ${inf.match}%
                                </span>
                            </div>
                            <p class="text-gray-600">${inf.category} • 팔로워 ${inf.followers}</p>
                            <p class="text-blue-600 text-sm mt-1">💡 ${inf.reason}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 border rounded hover:bg-gray-50" onclick="unlockDetail(${i})">
                            상세보기 (50C)
                        </button>
                        <button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                            바로컨택 (150C)
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('influencerList').innerHTML = html;
            document.getElementById('resultArea').classList.remove('hidden');
        }

        function unlockDetail(id) {
            alert('크레딧이 차감되고 상세 정보가 공개됩니다! (실제 결제 연동 필요)');
        }
    </script>
</body>
</html>
